name: family_vault
description: "Family Vault - offline-first personal information management app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

# NOTE (Phase 01 scope):
# Only packages actually used in this phase are declared below.
# The remaining packages approved in 03_TECH_STACK.md (flutter_secure_storage,
# file_picker, image_picker, url_launcher, google_sign_in, googleapis, intl,
# uuid) are intentionally NOT installed yet. Each will be added in the phase
# where it is first used.
#
# NOTE (Phase 06 scope):
# sqflite, sqflite_common_ffi, and path_provider added to enable local
# persistence. sqflite_common_ffi is required in addition to sqflite
# because plain sqflite has no Windows/desktop implementation — this
# project targets both Android and Windows per 03_TECH_STACK.md, so the
# FFI-backed desktop implementation is necessary, not optional. Approved
# as an explicit exception alongside Phase 06.
#
# NOTE (Phase 11 scope):
# Cloud authentication + shared vault dependencies added below. Final list
# per the approved, revised Phase 11 design — minimized after researching
# Windows Google Sign-In:
#   - firebase_core / firebase_auth / cloud_firestore: official Firebase
#     packages; Windows is a supported platform for all three directly,
#     no separate "_desktop" delegate packages needed.
#   - google_sign_in: official, Android-only sign-in flow.
#   - desktop_webview_auth: Windows Google Sign-In via a native WebView.
#     Maintained by Invertase (verified publisher, the same organization
#     that builds and maintains FlutterFire) — the current best-maintained
#     answer to google_sign_in's lack of Windows support. Verified as the
#     current version compatible with this project's Dart SDK constraint
#     immediately before adding it (see Phase 11 final design notes).
#   - share_plus: "Share Vault ID" button — native share sheet, no
#     first-party Flutter API covers this; fluttercommunity.dev maintained,
#     supports both Android and Windows.
# Explicitly NOT added: oauth2, crypto, url_launcher, uuid,
# firebase_auth_desktop/firebase_core_desktop, flutter_secure_storage —
# none proved necessary once desktop_webview_auth was chosen.

dependencies:
  flutter:
    sdk: flutter

  # Approved state management (03_TECH_STACK.md) — wired via ProviderScope
  # in main.dart starting from Phase 01.
  flutter_riverpod: ^2.5.1

  # Default icon set bundled by the standard Flutter project template.
  cupertino_icons: ^1.0.8

  # Local database (03_TECH_STACK.md) — Android implementation.
  sqflite: ^2.4.1

  # Desktop (Windows/Linux/macOS) FFI backend for sqflite. Required
  # because plain sqflite does not support Windows, and this project's
  # approved platform list includes Windows.
  sqflite_common_ffi: ^2.3.4

  # Resolves a writable, cross-platform directory for the database file
  # (03_TECH_STACK.md approved package).
  path_provider: ^2.1.4

  # --- Phase 11: cloud authentication + shared vaults ---

  # Firebase bootstrap. Required by every other Firebase package below.
  firebase_core: ^4.12.1

  # Auth state (authStateChanges), Google credential sign-in, sign-out.
  # Officially supports Android and Windows.
  firebase_auth: ^6.5.6

  # Vaults / members / join-requests storage. Officially supports
  # Android and Windows.
  cloud_firestore: ^6.4.1

  # Android Google Sign-In (official; Android/iOS/Web only). 7.2.0's
  # singleton (`GoogleSignIn.instance`) API — see auth_service.dart.
  google_sign_in: ^7.2.0

  # Windows Google Sign-In via native WebView OAuth. Maintained by
  # Invertase (FlutterFire's maintainers, verified pub.dev publisher).
  # Only used on Platform.isWindows — see lib/services/auth_service.dart.
  desktop_webview_auth: ^0.0.16

  # "Share Vault ID" button — native share sheet on Android and Windows.
  share_plus: ^13.1.0

  # --- Phase 12: credential management + UX improvements ---

  # Persists the user's last-selected sort option locally (the one new
  # dependency approved for Phase 12 — this project's first local
  # key-value settings store; Phase 11 deliberately avoided adding one
  # for a similar "remember last vault" feature).
  shared_preferences: ^2.3.4

  # --- Phase 13: vault security (PIN lock, biometrics, auto-lock) ---

  # Salted PIN hashing — dart-lang official, actively maintained,
  # stable API (sha256/Hmac) unchanged for years. The one new
  # dependency the "do not store plaintext PINs" requirement actually
  # needs; nothing in Dart's core SDK provides a hash function.
  crypto: ^3.0.3

  # Biometric (fingerprint) authentication. Officially maintained by
  # flutter.dev (verified publisher) with genuine Windows support via
  # the endorsed local_auth_windows federated plugin (Windows Hello) —
  # verified before adding, since Phase 11 was burned once already by
  # assuming a package covered Windows when it didn't.
  #
  # Pinned to the 2.x line (^2.3.0), NOT the current 3.x line
  # (3.0.2 at time of writing): 3.x requires Dart SDK 3.10+, above
  # this project's `environment: sdk: ^3.5.0` constraint, and bumping
  # that constraint project-wide just for this one package would risk
  # unrelated dependency-resolution effects — the opposite of "avoid
  # unnecessary refactoring." 2.3.0 requires only Dart 3.2+ (well
  # within range) and exposes the exact same stable API this project
  # uses (canCheckBiometrics/isDeviceSupported/getAvailableBiometrics/
  # authenticate) — nothing here depends on any 3.x-only addition.
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
