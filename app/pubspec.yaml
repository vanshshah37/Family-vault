name: family_vault
description: "Family Vault - offline-first personal information management app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

# NOTE (Phase 01 scope):
# Only packages actually used in this phase are declared below.
# The remaining packages approved in 03_TECH_STACK.md (sqflite,
# flutter_secure_storage, file_picker, image_picker, url_launcher,
# google_sign_in, googleapis, path_provider, intl, uuid) are intentionally
# NOT installed yet. Each will be added in the phase where it is first used.

dependencies:
  flutter:
    sdk: flutter

  # Approved state management (03_TECH_STACK.md) — wired via ProviderScope
  # in main.dart starting from Phase 01.
  flutter_riverpod: ^2.5.1

  # Default icon set bundled by the standard Flutter project template.
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
